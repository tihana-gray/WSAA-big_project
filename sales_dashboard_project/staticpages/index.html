<!DOCTYPE html>
<html>
<head>
    <title>Deals Dashboard</title>
</head>
<body>

<h1>Deals Dashboard</h1>

<button onclick="getDeals()">Load Deals</button>
<!-- This button calls the JavaScript function getDeals() when clicked. 
It triggers a GET request to the Flask API.
📚 References:
# https://www.w3schools.com/jsref/event_onclick.asp
# https://www.w3schools.com/tags/ev_onclick.asp
# https://www.geeksforgeeks.org/javascript/javascript-onclick-event/
-->

<ul id="dealList"></ul>
<!-- This unordered list displays deals.
Each deal is added as a list item with JavaScript.
📚 References:
# https://www.w3schools.com/html/html_lists.asp
# https://www.w3schools.com/tags/tag_ul.asp
# https://www.w3schools.com/html/html_lists.asp
# https://www.dofactory.com/html/ul/id
-->
<hr>


<h2>Add Deal</h2>


<input id="deal_name" placeholder="Deal Name">
<input id="deal_id" placeholder="Deal ID">
<input id="amount" placeholder="Amount">
<!-- Input fields allow to enter deal data.
📚 References:
 # https://www.w3schools.com/html/html_form_input_types.asp
 # https://www.w3schools.com/hTml/html_id.asp
 # https://stackoverflow.com/questions/7470268/html-input-name-vs-id
 # https://github.com/andrewbeattycourseware/wsaa-courseware/blob/main/code/Topic08-generated-client/staticpages/index.html
 -->

 <button onclick="addDeal()">Add Deal</button>
 <!-- addDeal() sends POST request to API.
 It sends a POST request with JSON data to the Flask API.
 📚 References:
 # https://www.w3schools.com/jsref/event_onclick.asp
 # https://stackoverflow.com/questions/66341496/create-an-html-button-that-works-as-a-link-with-an-onclick
 -->

 <hr>


 <!-- DELETE DEAL SECTION -->

 <h2>Delete Deal</h2>
 
<input id="delete_id" placeholder="Deal ID">

<button onclick="deleteDeal()">Delete</button>
<!-- This button calls deleteDeal() function.
It sends a DELETE request to the Flask API using deal_id.
📚 References:
# https://restfulapi.net/http-methods/
# https://stackoverflow.com/questions/56531549/delete-element-that-called-onclick
# https://forum.freecodecamp.org/t/make-delete-and-edit-buttons-work/555493
-->

<script>
//////////////////////
//GET DEALS
/////////////////////

function getDeals() {
    fetch('/deals')
    .then(response => response.json())
    .then(data => {
        let list = document.getElementById('dealList');
        list.innerHTML = '';

        for (let i = 0; i < data.length; i++) {

            let li = document.createElement("li");
            li.innerText = data[i].deal_name;

            list.appendChild(li);
        }
    });

/*
This function sends a GET request to the Flask API.
It retrieves all deals and displays them list.
# fetch() sends request
# Convert response to JSON
# Loop through deals
# Create <li> elements dynamically

📚 References:
# https://mimo.org/glossary/javascript/comment
# https://developer.mozilla.org/en-US/docs/Web/API/Fetch_API
# https://developer.mozilla.org/en-US/docs/Web/API/Response/json
# https://www.geeksforgeeks.org/javascript/why-we-use-then-method-in-javascript/
# https://stackoverflow.com/questions/56976581/how-to-get-data-out-of-then-function
# https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Promise/then
# https://www.geeksforgeeks.org/html/html-dom-li-object/
# https://www.w3schools.com/js/js_loop_for.asp
# https://www.w3schools.com/jsref/dom_obj_li.asp
# https://medium.com/@sonia277cse/javascript-and-the-dom-part-4-creating-appending-removing-elements-71918912db0f
*/

////////////////
// ADD DEAL
////////////////

function addDeal() {

    let name = document.getElementById('deal_name').value;
    let id = document.getElementById('deal_id').value;
    let amount = document.getElementById('amount').value;

    fetch('/deals/add', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            close_date: "2026-05-01",
            deal_name: name,
            deal_id: parseInt(id),
            deal_stage: "Closed Won",
            amount: parseFloat(amount),
            closed_amount: 0,
            traffic_source: "Web"
        })
    })
    .then(response => response.json())
    .then(data => alert(data.message));
}

/*   
This sends a POST request to the API.
It collects input values and sends them as JSON.
*/

////////////////
//DELETE DEAL
////////////////

function deleteDeal() {

let id = document.getElementById('delete_id').value;

fetch('/deals/delete/' + id, {
    method: 'DELETE'
})
.then(response => response.json())
.then(data => alert(data.message));
}

</script>
